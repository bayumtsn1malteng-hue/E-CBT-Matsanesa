<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ujian Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah seleksi teks dan klik kanan untuk keamanan tambahan */
        body { -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <div id="login-overlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Masuk Ujian</h2>
                <p class="text-slate-500 mt-1">Silakan isi identitas Anda untuk memulai.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                    <input type="text" id="input-nama" list="list-nama" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Masukkan nama..." autocomplete="off">
                    <datalist id="list-nama"></datalist>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Kelas</label>
                    <input type="text" id="input-kelas" list="list-kelas" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Contoh: XII IPA 1" autocomplete="off">
                    <datalist id="list-kelas"></datalist>
                </div>
                <button onclick="mulaiUjian()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg">
                    Mulai Kerjakan
                </button>
            </div>
        </div>
    </div>

    <div id="main-exam-content" class="hidden">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <header class="bg-white shadow-sm rounded-xl p-4 mb-6 border border-slate-200 flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-slate-800">Ujian Online Aktif</h1>
                    <p class="text-sm text-slate-500">Siswa: <span id="display-nama" class="font-semibold"></span> | Kelas: <span id="display-kelas" class="font-semibold"></span></p>
                </div>
                <div class="text-right">
                    <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold border border-red-200">
                        Sistem Pengawas Aktif
                    </span>
                </div>
            </header>

            <main class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" style="height: 80vh;">
                <iframe 
                    id="exam-iframe"
                    src="https://docs.google.com/forms/d/e/1FAIpQLSfvXtr-wI5uj7Yz45Ah0I-rJhrGfpCF86rvAFlg_rcu5zjHvg/viewform?embedded=true" 
                    width="100%" 
                    height="100%" 
                    frameborder="0">
                    Memuat...
                </iframe>
            </main>
        </div>
    </div>

    <div id="warning-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-[200] items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-red-600">Terdeteksi Curang!</h3>
            <p class="text-slate-600 mt-2 mb-6">Anda terdeteksi meninggalkan halaman. Pelanggaran ini telah dilaporkan ke guru pengampu.</p>
            <button onclick="closeModal()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl shadow-lg">
                Kembali & Refresh
            </button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMhXGU8Cpcv2oLjTge2gZsH-C32u4wFIOrmOah80eKQX1Fgos7p6K1qQbvmyhmMsQ4/exec"; 
        let studentData = { nama: "", kelas: "" };
        let violations = 0;
        let dataSiswaGlobal = []; // Perbaikan: Spasi dihilangkan

        // Handle inisialisasi aplikasi saat halaman dimuat
        window.onload = async () => {
            // 1. Load data autocomplete dari JSON
            await loadSiswaData();

            // 2. Cek session login untuk handle refresh otomatis
            const savedNama = sessionStorage.getItem("student_nama");
            const savedKelas = sessionStorage.getItem("student_kelas");
            
            if (savedNama && savedKelas) {
                studentData.nama = savedNama;
                studentData.kelas = savedKelas;
                masukHalamanUjian();
            }
        };

        // Fungsi untuk mengambil data dari nama_siswa.json dan mengisinya ke datalist
        const GITHUB_JSON_FILE = "https://raw.githubusercontent.com/bayumtsn1malteng-hue/E-CBT-Matsanesa/refs/heads/main/nama_siswa.json"
        async function loadSiswaData() {
            try {
                const response = await fetch('GITHUB_JSON_FILE');
                if (!response.ok) throw new Error('Gagal memuat data nama_siswa.json');
                
                dataSiswaGlobal = await response.json();
                
                const listNama = document.getElementById('list-nama');
                const listKelas = document.getElementById('list-kelas');
                
                const daftarKelasUnik = new Set();
                
                listNama.innerHTML = '';
                listKelas.innerHTML = '';
                
                dataSiswaGlobal.forEach(siswa => {
                    if (siswa["NAMA SISWA"]) {
                        const namaOption = document.createElement('option');
                        namaOption.value = siswa["NAMA SISWA"];
                        listNama.appendChild(namaOption);
                    }
                    
                    if (siswa["KELAS"]) {
                        daftarKelasUnik.add(siswa["KELAS"].toUpperCase().trim());
                    }
                });
                
                daftarKelasUnik.forEach(kelas => {
                    const kelasOption = document.createElement('option');
                    kelasOption.value = kelas;
                    listKelas.appendChild(kelasOption);
                });
                
            } catch (error) {
                console.error("Terjadi kesalahan sistem:", error);
            }
        }

        // Fitur Otomatis mengisi kelas jika nama valid terdeteksi
        document.getElementById('input-nama').addEventListener('input', function(e) {
            const namaTerpilih = e.target.value;
            const siswaDitemukan = dataSiswaGlobal.find(siswa => siswa["NAMA SISWA"] === namaTerpilih);
            
            if (siswaDitemukan) {
                document.getElementById('input-kelas').value = siswaDitemukan["KELAS"];
            }
        });

        function mulaiUjian() {
            const nama = document.getElementById('input-nama').value;
            const kelas = document.getElementById('input-kelas').value;

            if (nama.trim() === "" || kelas.trim() === "") {
                alert("Mohon isi Nama dan Kelas terlebih dahulu!");
                return;
            }

            studentData.nama = nama;
            studentData.kelas = kelas;
            
            sessionStorage.setItem("student_nama", nama);
            sessionStorage.setItem("student_kelas", kelas);

            masukHalamanUjian();
        }

        function masukHalamanUjian() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-exam-content').classList.remove('hidden');
            document.getElementById('display-nama').innerText = studentData.nama;
            document.getElementById('display-kelas').innerText = studentData.kelas;
        }

        function logToSpreadsheet() {
            const payload = {
                username: studentData.nama,
                userClass: studentData.kelas,
                message: "Meninggalkan tab/halaman ujian",
                timestamp: new Date().toLocaleString("id-ID")
            };

            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).catch(err => console.error("Gagal lapor spreadsheet:", err));
        }

        function showWarning() {
            if (document.getElementById('main-exam-content').classList.contains('hidden')) return;

            document.getElementById('warning-modal').classList.remove('hidden');
            document.getElementById('warning-modal').classList.add('flex');
            document.getElementById('alert-sound').play().catch(e => {});
            
            logToSpreadsheet();
        }

        function closeModal() {
           window.location.reload();
        }

        // DETEKSI NYONTEK (Tab Switch / Minimize)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                showWarning();
            }
        });
    </script>
</body>
</html>
